<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birodalmi Hub</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #21262d;
            margin-bottom: 30px;
        }

        header h1 {
            color: #58a6ff;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            color: #8b949e;
            font-size: 1.1rem;
        }

        .section-title {
            font-size: 1.8rem;
            color: #f0f6fc;
            margin: 40px 0 20px 0;
            padding-left: 10px;
            border-left: 4px solid #58a6ff;
        }

        /* Modern Grid a médiatartalmaknak */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .media-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .media-card:hover {
            transform: translateY(-5px);
            border-color: #58a6ff;
        }

        .media-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        /* Videó kártya egyedi stílusa a lejátszás ikonnal */
        .video-card .video-overlay {
            position: relative;
        }

        .video-card .video-overlay::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(88, 166, 255, 0.8);
            color: white;
            font-size: 2rem;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .media-card:hover .video-overlay::after {
            background: rgba(88, 166, 255, 1);
        }
    </style>
</head>

<body>

    <header>
        <h1>Birodalmi Hub</h1>
        <p>A mi privát közös felhőnk és médiatárunk</p>
    </header>

    <main>
        <div class="section-title">📸 Közös Galéria</div>
        <div class="media-grid">

            <a href="kepek/elso_kep.jpg" data-fancybox="gallery" class="media-card">
                <img src="kepek/elso_kep.jpg" alt="Közös emlék">
            </a>

        </div>

        <div class="section-title">🎬 Közös Médiatár</div>
        <div class="media-grid">

            <a href="https://drive.google.com/uc?export=view&id=ID_HELYE" data-fancybox="gallery"
                class="media-card video-card">
                <div class="video-overlay">
                    <img src="https://drive.google.com/uc?export=view&id=1XqQ4h2sahQ2Jpuh0cecLgslsYTl3ezCW"
                        alt="Videó borító">
                </div>
            </a>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <script>
        // Fancybox inicializálása
        Fancybox.bind("[data-fancybox='gallery']", {
            // Itt adhatóak meg egyedi animációk vagy beállítások
        });
    </script>
</body>

</html>
