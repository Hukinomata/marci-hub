<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birodalmi Hub</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #21262d;
            margin-bottom: 30px;
        }

        header h1 {
            color: #58a6ff;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            color: #8b949e;
            font-size: 1.1rem;
        }

        .section-title {
            font-size: 1.8rem;
            color: #f0f6fc;
            margin: 40px 0 20px 0;
            padding-left: 10px;
            border-left: 4px solid #58a6ff;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .media-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .media-card:hover {
            transform: translateY(-5px);
            border-color: #58a6ff;
        }

        .media-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            background: #21262d;
            /* Amíg tölt a kép, egy szürke háttér jelenik meg */
        }
    </style>
</head>

<body>

    <header>
        <h1>Birodalmi Hub</h1>
        <p>A mi privát közös felhőnk és médiatárunk</p>
    </header>

    <main>
        <div class="section-title">📸 Közös Galéria</div>
        <div id="galeria" class="media-grid"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>

<script>
    // A képeid listája
    const kepek = [
        "elso_kep.jpg",
        "masodik_kep.jpg"
    ];

    const galeriaContainer = document.getElementById("galeria");

    // A JavaScript itt most az oldal pontos címét használja a képek eléréséhez
    const baseUrl = window.location.origin; 

    kepek.forEach(kepNev => {
        const card = document.createElement("a");
        // A teljes elérési út: domain + mappa + fájlnév
        card.href = `${baseUrl}/kepek/${kepNev}`;
        card.setAttribute("data-fancybox", "gallery");
        card.className = "media-card";

        const img = document.createElement("img");
        img.src = `${baseUrl}/kepek/${kepNev}`;
        img.alt = "Közös emlék";
        img.loading = "lazy";

        card.appendChild(img);
        galeriaContainer.appendChild(card);
    });

    Fancybox.bind("[data-fancybox='gallery']", {});
</script>
</body>

</html>
