<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marci Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #08090c;
            font-family: 'Orbitron', sans-serif;
        }
        /* Finom pulzáló animáció a háttér izzásának */
        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.25; }
        }
        .bg-glow {
            animation: pulseGlow 8s infinite ease-in-out;
        }
    </style>
</head>
<body class="relative flex items-center justify-center min-h-screen overflow-hidden text-white">

    <div class="bg-glow absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] md:w-[600px] md:h-[600px] bg-orange-600 rounded-full blur-[100px] md:blur-[160px] pointer-events-none z-0"></div>

    <div class="relative z-10 flex flex-col items-center justify-center select-none">
        <div id="clock" class="text-6xl sm:text-8xl md:text-[11rem] font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-orange-500 via-red-500 to-amber-500 drop-shadow-[0_0_35px_rgba(249,115,22,0.5)]">
            00:00:00
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Óra, perc, másodperc kinyerése és kétjegyűvé formázása
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // Kiírás a képernyőre
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // Azonnali indítás és másodpercenkénti frissítés
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
